<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERROR 404</title>

    <style>
        body{
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: monospace;
            color:red;
            overflow: hidden;
        }
        .container{
            border: 2px solid red;
            padding: 40px;
            text-align: center;
            max-width: 600px;
            background: rgba(10, 0, 0, 0.9);
            animation: parpadeoGeneral 1.5s infinite alternate;
        }
        @keyframes jitterSutil {
            0% { transform: translate(0); text-shadow: 0 0 5px rgba(255,0,0,0.5); }
            50% { transform: translate(-1px, 1px); text-shadow: 1px -1px 0 rgba(0, 255, 255, 0.4); }
            100% { transform: translate(1px, -1px); text-shadow: -1px 1px 0 rgba(255, 0, 255, 0.4); }
        }
        @keyframes parpadeoBloque {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(255,0,0,1); }
            50% { opacity: 0; text-shadow: 0 0 0 rgba(255,0,0,0); }
        }

        h1 {
            color: red; 
            font-size: 45px;
            text-shadow: 2px 0px 0px rgba(0, 255, 255, 0.6), -2px 0px 0px rgba(255, 0, 255, 0.6);
            animation: glitchViolento 0.15s infinite; 
        }
        @keyframes glitchViolento {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        p { color: #ff4444; font-size: 18px;}
        .ip { color: white; font-weight: bold; font-size: 20px;}
        .banned-info {
            color: red; 
            font-size: 24px; 
            display: block;
            margin-top: 15px;
            position: relative;
            animation: jitterSutil 0.2s infinite; 
        }
        .banned-highlight {
            font-weight: bold;
        }
        .case-id-block {
            color: red;
            opacity: 1;
            animation: parpadeoBloque 0.15s infinite;
            display: inline-block;
            margin: 0 5px; 
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>ACCOUNT BANNED</h1>
        <p>Your account and IP address have been permanently banned from PvZ2 Reloaded.</p>
        <p class="ip">IP detectada: <span id="ip">Rastreando...</span></p>
        <p>Reason: <strong style="color:red">Unauthorized modification of game files</strong></p>
        
        <p class="banned-info">CASE ID: <span class="banned-highlight">#</span><span class="case-id-dynamic" id="dynamicID">00</span><span class="case-id-block">██</span><span class="banned-highlight">-BANNED</span></p>
    </div>

    <script>
        fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
            document.getElementById('ip').textContent = data.ip;
        }).catch(e => {
            document.getElementById('ip').textContent = 'ERROR';
        });
        function iniciarAnimacionCaseID() {
            const dynamicID = document.getElementById('dynamicID');
            setInterval(() => {
                const randomNum = Math.floor(Math.random() * 100);
                const formattedNum = randomNum.toString().padStart(2, '0');
                dynamicID.textContent = formattedNum;
                if (Math.random() > 0.9) { 
                    dynamicID.style.color = Math.random() > 0.5 ? '#ff4444' : '#ff00aa'; 
                } else {
                    dynamicID.style.color = 'red';
                }

            }, 50);
        }
        iniciarAnimacionCaseID();

    </script>
</body>
</html>
