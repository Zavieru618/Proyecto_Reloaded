<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png">
    <title>PvZ2 Reloaded</title>

    <style>
       body {
    background-color: #0a0a0f;
    background-image:
        linear-gradient(rgba(123, 47, 247, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123, 47, 247, 0.15) 1px, transparent 1px),
        radial-gradient(ellipse at 20% 30%, rgba(123, 47, 247, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(74, 0, 128, 0.4) 0%, transparent 50%);
    background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%;
    min-height: 250vh;
    margin: 0;
    font-family: 'Mifuente',sans-serif;
    }
    nav{
        background-color: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        padding: 5px 20px;
        display: flex;
        align-items: center;
        position: relative;
    }
    .logo{
        width: 150px;
        height: 100px;
        border-radius: 9%;
    }
    .links{
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        gap: 60px;
        display: flex;
    }
    nav a{
        color: white;
        text-decoration: none;
        font-size: 35px;
        filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.5));
    }
    nav a:hover{
        background: linear-gradient(135deg, #5f09e8, #a07800);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    h1{
        color: white;
        text-shadow: 2px 2px 0px black, -2px -2px 0px black, 2px -2px 0px black, -2px 2px 0px black;
        filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.5));
    }
    p{
        color:white;
        text-shadow: 2px 2px 0px black, -2px -2px 0px black, -2px 2px 0px black;
        filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.5));
    }
    .particula{
        position: fixed;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: white;
        pointer-events: none;
        animation: desvanecer 0.6s ease forwards;
    }
    .tarjeta{
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 15px;
        padding: 40px 60px;
        margin: 40px auto;
        max-width: 1000px;
        width: 85%;
        backdrop-filter: blur(10px);
        position: relative;
        overflow: visible;
    }
    .img-mundo{
        position: absolute;
        left: -80px; 
        top: 50%;
        transform: translateY(-50%);
        width: 250px;
        height: auto;
    }
    .tarjeta-contenido{
        display: flex;
        align-items: center;
        gap: 30px;
    }
    .texto{
        margin-left: 100px;
        color: white;
    }
    .seccion{
        display: flex;
        justify-content: center;
        padding: 40px;
    }
    .nube {
    position: fixed;
    background: rgba(123, 47, 247, 0.3);
    border-radius: 50px;
    filter: blur(8px);
    }
    .nube::before, .nube::after {
    content: '';
    position: absolute;
    background: rgba(123, 47, 247, 0.3);
    border-radius: 50%;
    }
    .nube-izq {
    bottom: 0;
    left: -50px;
    width: 350px;
    height: 120px;
    }
    .nube-izq::before {
    width: 200px;
    height: 200px;
    top: -100px;
    left: 30px;
    }
    .nube-izq::after {
    width: 140px;
    height: 140px;
    top: -70px;
    left: 150px;
    }
    .nube-der {
    bottom: 0;
    right: -50px;
    width: 350px;
    height: 120px;
    }
    .nube-der::before {
    width: 200px;
    height: 200px;
    top: -100px;
    left: 30px;
    }
    .nube-der::after {
    width: 1400px;
    height: 140px;
    top: -70px;
    left: 150px;
    }
    @font-face{
        font-family: 'Mifuente';
        src: url('mifuente.otf');
    }
    @keyframes desvanecer{
        0% { transform: scale(1); opacity: 1;}
        100% {transform: scale(0); opacity: 0; }
    }
    
    </style>
</head>
<body>
    
    <nav>
        <img src="img/rdl.png" alt="logo" class="logo">
        <div class="links">
            <a href="#" class="active" onclick="mostrar('Inicio')">Inicio</a>
            <a href="#" onclick="mostrar('Novedades')">Novedades</a>
            <a href="html_alter/ban.html">Descarga</a>
        </div>
    </nav>

    <div id="Inicio" class="seccion">
        <div class="tarjeta">
            <div class="tarjeta-contenido">
                <img src="img/logo1.png" alt="mundo" class="img-mundo">
                    <div class="texto">
            <h1>Inicio</h1>
            <p>Testeando...<br>
            Testeando...<br>
            Testeando...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="Novedades" class="seccion" style="display: none">
        <div class="tarjeta">
        <h1>Novedades</h1>
        <p>Testeando...</p>
        </div>
    </div>

    <div class="nube nube-izq"></div>
    <div class="nube nube-der"></div>

    <script>
        function mostrar(id, elemento){
            document.querySelectorAll('.seccion').forEach(s=>s.style.display='none');
            document.getElementById(id).style.display='block';

            document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
            elemento.classList.add('active');
        }
        document.addEventListener('mousemove', (e)=>{
            const particula=document.createElement('div');
            particula.classList.add('particula');
            particula.style.left=e.clientX + 'px';
            particula.style.top=e.clientY + 'px';
            document.body.appendChild(particula);

            setTimeout(()=>particula.remove(),600);
        })
    </script>
</body>
</html>
